<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配置保存测试</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-top: 0; }
    h2 { color: #666; border-bottom: 2px solid #18a058; padding-bottom: 8px; }
    button {
      background: #18a058;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }
    button:hover { background: #148a4a; }
    button.secondary { background: #666; }
    button.secondary:hover { background: #555; }
    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 15px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .success { color: #4ade80; }
    .error { color: #f87171; }
    .info { color: #60a5fa; }
    .warning { color: #fbbf24; }
    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-left: 10px;
    }
    .status.ok { background: #4ade80; color: white; }
    .status.fail { background: #f87171; color: white; }
    .path-display {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 4px;
      font-family: 'Consolas', monospace;
      font-size: 12px;
      margin-top: 10px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔧 配置保存测试工具</h1>
    <p>测试 WPS FileSystem API 的配置文件读写功能</p>
  </div>

  <div class="card">
    <h2>1️⃣ 环境检测</h2>
    <button onclick="checkEnvironment()">检测环境</button>
    <div id="env-status"></div>
  </div>

  <div class="card">
    <h2>2️⃣ 路径测试</h2>
    <button onclick="testPaths()">测试路径获取</button>
    <div id="path-status"></div>
  </div>

  <div class="card">
    <h2>3️⃣ 文件操作测试</h2>
    <button onclick="testWrite()">测试写入</button>
    <button onclick="testRead()">测试读取</button>
    <button onclick="testExists()">检查文件</button>
    <button class="secondary" onclick="testDelete()">删除文件</button>
    <div id="file-status"></div>
  </div>

  <div class="card">
    <h2>4️⃣ 完整流程测试</h2>
    <button onclick="testFullFlow()">运行完整测试</button>
    <div id="flow-status"></div>
  </div>

  <div class="card">
    <h2>📋 控制台日志</h2>
    <button class="secondary" onclick="clearLog()">清空日志</button>
    <div id="log" class="log">等待测试...</div>
  </div>

  <script>
    const logEl = document.getElementById('log')
    
    function log(msg, type = 'info') {
      const time = new Date().toLocaleTimeString()
      const className = type
      const icon = {
        info: 'ℹ️',
        success: '✅',
        error: '❌',
        warning: '⚠️'
      }[type] || 'ℹ️'
      
      logEl.innerHTML += `<span class="${className}">[${time}] ${icon} ${msg}</span>\n`
      logEl.scrollTop = logEl.scrollHeight
    }

    function clearLog() {
      logEl.innerHTML = ''
    }

    // 1. 环境检测
    function checkEnvironment() {
      clearLog()
      log('开始环境检测...', 'info')
      
      const hasWindow = typeof window !== 'undefined'
      const hasApp = typeof window.Application !== 'undefined'
      const hasFS = hasApp && window.Application.FileSystem
      const hasEnv = hasApp && window.Application.Env
      
      log(`Window 对象: ${hasWindow ? '✓' : '✗'}`, hasWindow ? 'success' : 'error')
      log(`Application 对象: ${hasApp ? '✓' : '✗'}`, hasApp ? 'success' : 'error')
      log(`FileSystem API: ${hasFS ? '✓' : '✗'}`, hasFS ? 'success' : 'error')
      log(`Env API: ${hasEnv ? '✓' : '✗'}`, hasEnv ? 'success' : 'error')
      
      if (hasFS) {
        log('FileSystem 可用方法:', 'info')
        const methods = Object.keys(window.Application.FileSystem).filter(k => typeof window.Application.FileSystem[k] === 'function')
        methods.forEach(m => log(`  - ${m}`, 'info'))
      }
      
      if (hasEnv) {
        log('Env 可用方法:', 'info')
        const methods = Object.keys(window.Application.Env).filter(k => typeof window.Application.Env[k] === 'function')
        methods.forEach(m => log(`  - ${m}`, 'info'))
      }
      
      const statusEl = document.getElementById('env-status')
      statusEl.innerHTML = `
        <div style="margin-top: 10px;">
          <strong>WPS 环境:</strong> <span class="status ${hasApp ? 'ok' : 'fail'}">${hasApp ? '可用' : '不可用'}</span><br>
          <strong>FileSystem API:</strong> <span class="status ${hasFS ? 'ok' : 'fail'}">${hasFS ? '可用' : '不可用'}</span>
        </div>
      `
    }

    // 2. 路径测试
    function testPaths() {
      clearLog()
      log('开始路径测试...', 'info')
      
      if (typeof window.Application === 'undefined') {
        log('WPS Application 不可用', 'error')
        return
      }
      
      const tests = [
        {
          name: 'FileSystem.tmpdir()',
          fn: () => window.Application.FileSystem.tmpdir()
        },
        {
          name: 'Env.GetTempPath()',
          fn: () => window.Application.Env.GetTempPath()
        },
        {
          name: 'Env.GetUserDataPath()',
          fn: () => window.Application.Env.GetUserDataPath()
        }
      ]
      
      let foundPath = null
      const statusEl = document.getElementById('path-status')
      let html = '<div style="margin-top: 10px;">'
      
      tests.forEach(test => {
        try {
          const path = test.fn()
          if (path) {
            log(`${test.name}: ${path}`, 'success')
            html += `<strong>${test.name}:</strong> <span class="status ok">成功</span><div class="path-display">${path}</div>`
            if (!foundPath) foundPath = path
          } else {
            log(`${test.name}: 返回空`, 'warning')
            html += `<strong>${test.name}:</strong> <span class="status fail">返回空</span><br>`
          }
        } catch (error) {
          log(`${test.name}: ${error.message}`, 'error')
          html += `<strong>${test.name}:</strong> <span class="status fail">失败</span> - ${error.message}<br>`
        }
      })
      
      if (foundPath) {
        const normalizedPath = foundPath.replace(/[/\\]+$/, '')
        const configPath = normalizedPath + '\\wps_addon_config.json'
        log(`推荐配置文件路径: ${configPath}`, 'success')
        html += `<div style="margin-top: 10px;"><strong>推荐配置文件路径:</strong><div class="path-display">${configPath}</div></div>`
      }
      
      html += '</div>'
      statusEl.innerHTML = html
    }

    // 3. 写入测试
    function testWrite() {
      clearLog()
      log('开始写入测试...', 'info')
      
      if (typeof window.Application === 'undefined') {
        log('WPS Application 不可用', 'error')
        return
      }
      
      try {
        const tempPath = window.Application.FileSystem.tmpdir()
        const normalizedPath = tempPath.replace(/[/\\]+$/, '')
        const filePath = normalizedPath + '\\wps_addon_config.json'
        
        log(`目标路径: ${filePath}`, 'info')
        
        const testData = {
          test: true,
          timestamp: new Date().toISOString(),
          message: '这是一个测试配置'
        }
        
        log('写入数据: ' + JSON.stringify(testData, null, 2), 'info')
        
        window.Application.FileSystem.writeFileString(filePath, JSON.stringify(testData, null, 2))
        log('写入成功！', 'success')
        
        const statusEl = document.getElementById('file-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <strong>写入结果:</strong> <span class="status ok">成功</span>
            <div class="path-display">${filePath}</div>
          </div>
        `
      } catch (error) {
        log('写入失败: ' + error.message, 'error')
        const statusEl = document.getElementById('file-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <strong>写入结果:</strong> <span class="status fail">失败</span> - ${error.message}
          </div>
        `
      }
    }

    // 4. 读取测试
    function testRead() {
      clearLog()
      log('开始读取测试...', 'info')
      
      if (typeof window.Application === 'undefined') {
        log('WPS Application 不可用', 'error')
        return
      }
      
      try {
        const tempPath = window.Application.FileSystem.tmpdir()
        const normalizedPath = tempPath.replace(/[/\\]+$/, '')
        const filePath = normalizedPath + '\\wps_addon_config.json'
        
        log(`目标路径: ${filePath}`, 'info')
        
        const content = window.Application.FileSystem.readFileString(filePath)
        log('读取成功！', 'success')
        log('文件内容:\n' + content, 'info')
        
        const statusEl = document.getElementById('file-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <strong>读取结果:</strong> <span class="status ok">成功</span>
            <div class="path-display">${content}</div>
          </div>
        `
      } catch (error) {
        log('读取失败: ' + error.message, 'error')
        const statusEl = document.getElementById('file-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <strong>读取结果:</strong> <span class="status fail">失败</span> - ${error.message}
          </div>
        `
      }
    }

    // 5. 检查文件
    function testExists() {
      clearLog()
      log('检查文件是否存在...', 'info')
      
      if (typeof window.Application === 'undefined') {
        log('WPS Application 不可用', 'error')
        return
      }
      
      try {
        const tempPath = window.Application.FileSystem.tmpdir()
        const normalizedPath = tempPath.replace(/[/\\]+$/, '')
        const filePath = normalizedPath + '\\wps_addon_config.json'
        
        log(`目标路径: ${filePath}`, 'info')
        
        const exists = window.Application.FileSystem.Exists(filePath)
        log(`文件存在: ${exists}`, exists ? 'success' : 'warning')
        
        const statusEl = document.getElementById('file-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <strong>文件存在:</strong> <span class="status ${exists ? 'ok' : 'fail'}">${exists ? '是' : '否'}</span>
            <div class="path-display">${filePath}</div>
          </div>
        `
      } catch (error) {
        log('检查失败: ' + error.message, 'error')
      }
    }

    // 6. 删除文件
    function testDelete() {
      if (!confirm('确定要删除测试配置文件吗？')) return
      
      clearLog()
      log('删除文件...', 'info')
      
      if (typeof window.Application === 'undefined') {
        log('WPS Application 不可用', 'error')
        return
      }
      
      try {
        const tempPath = window.Application.FileSystem.tmpdir()
        const normalizedPath = tempPath.replace(/[/\\]+$/, '')
        const filePath = normalizedPath + '\\wps_addon_config.json'
        
        log(`目标路径: ${filePath}`, 'info')
        
        window.Application.FileSystem.unlinkSync(filePath)
        log('删除成功！', 'success')
        
        const statusEl = document.getElementById('file-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <strong>删除结果:</strong> <span class="status ok">成功</span>
          </div>
        `
      } catch (error) {
        log('删除失败: ' + error.message, 'error')
      }
    }

    // 7. 完整流程测试
    function testFullFlow() {
      clearLog()
      log('========================================', 'info')
      log('开始完整流程测试...', 'info')
      log('========================================', 'info')
      
      if (typeof window.Application === 'undefined') {
        log('WPS Application 不可用', 'error')
        return
      }
      
      try {
        // 步骤 1: 获取路径
        log('\n步骤 1: 获取路径', 'info')
        const tempPath = window.Application.FileSystem.tmpdir()
        log(`临时目录: ${tempPath}`, 'success')
        
        const normalizedPath = tempPath.replace(/[/\\]+$/, '')
        const filePath = normalizedPath + '\\wps_addon_config.json'
        log(`配置文件路径: ${filePath}`, 'success')
        
        // 步骤 2: 写入数据
        log('\n步骤 2: 写入数据', 'info')
        const testConfig = {
          ai: {
            apiKey: 'sk-test-12345',
            baseUrl: 'https://api.example.com',
            model: 'test-model',
            timeout: 30000
          },
          system: {
            firstLoadCompleted: true,
            showWelcome: false,
            autoSave: true
          },
          _test: {
            timestamp: new Date().toISOString(),
            message: '完整流程测试'
          }
        }
        
        window.Application.FileSystem.writeFileString(filePath, JSON.stringify(testConfig, null, 2))
        log('✓ 数据写入成功', 'success')
        
        // 步骤 3: 验证文件存在
        log('\n步骤 3: 验证文件存在', 'info')
        const exists = window.Application.FileSystem.Exists(filePath)
        log(`✓ 文件存在: ${exists}`, exists ? 'success' : 'error')
        
        if (!exists) {
          throw new Error('文件保存后不存在！')
        }
        
        // 步骤 4: 读取数据
        log('\n步骤 4: 读取数据', 'info')
        const content = window.Application.FileSystem.readFileString(filePath)
        log('✓ 数据读取成功', 'success')
        
        // 步骤 5: 验证数据
        log('\n步骤 5: 验证数据', 'info')
        const readConfig = JSON.parse(content)
        const dataMatch = readConfig._test && readConfig._test.message === '完整流程测试'
        log(`✓ 数据验证: ${dataMatch ? '匹配' : '不匹配'}`, dataMatch ? 'success' : 'error')
        
        // 总结
        log('\n========================================', 'success')
        log('✅ 完整流程测试通过！', 'success')
        log('========================================', 'success')
        
        const statusEl = document.getElementById('flow-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <h3 style="color: #4ade80; margin: 10px 0;">✅ 所有测试通过！</h3>
            <ul style="line-height: 1.8;">
              <li>✓ 路径获取成功</li>
              <li>✓ 数据写入成功</li>
              <li>✓ 文件存在验证通过</li>
              <li>✓ 数据读取成功</li>
              <li>✓ 数据验证通过</li>
            </ul>
            <div class="path-display">${filePath}</div>
          </div>
        `
      } catch (error) {
        log('\n========================================', 'error')
        log('❌ 测试失败: ' + error.message, 'error')
        log('========================================', 'error')
        
        const statusEl = document.getElementById('flow-status')
        statusEl.innerHTML = `
          <div style="margin-top: 10px;">
            <h3 style="color: #f87171; margin: 10px 0;">❌ 测试失败</h3>
            <div class="path-display">${error.message}</div>
          </div>
        `
      }
    }
  </script>
</body>
</html>
